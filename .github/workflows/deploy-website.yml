name: Deploy Website to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - "vite.website.config.ts"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Inject site URL into HTML
        if: vars.VITE_SITE_URL != ''
        run: sed -i "s|https://YOUR_DOMAIN|${{ vars.VITE_SITE_URL }}|g" website/index.html

      - name: Build website
        run: pnpm build:website
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/ext-helper/' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_GITHUB_URL: ${{ vars.VITE_GITHUB_URL }}
          VITE_CHROME_STORE_URL: ${{ vars.VITE_CHROME_STORE_URL }}
          VITE_FIREFOX_ADDON_URL: ${{ vars.VITE_FIREFOX_ADDON_URL }}
          VITE_EDGE_ADDON_URL: ${{ vars.VITE_EDGE_ADDON_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
